suite: Test service account

templates:
  - templates/serviceaccount.yaml

release:
  namespace: default

tests:
  - it: should pass with default settings
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-hello-kubernetes
      - hasDocuments:
          count: 1
      - equal:
          path: automountServiceAccountToken
          value: true
