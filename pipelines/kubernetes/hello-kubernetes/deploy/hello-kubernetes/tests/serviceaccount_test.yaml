suite: Test service account

templates:
  - templates/serviceaccount.yaml

release:
  name: test-release
  namespace: default

tests:
  - it: should pass with default settings
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: test-release-hello-kubernetes
      - hasDocuments:
          count: 1
