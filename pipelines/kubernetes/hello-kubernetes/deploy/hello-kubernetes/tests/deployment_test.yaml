suite: Test deployment

templates:
  - templates/deployment.yaml

release:
  name: test-release

tests:
  - it: should provide expected defaults
    asserts:
      - isKind:
          of: Deployment
      - hasDocuments:
          count: 1
      - notEqual:
          path: spec.replicas
          value: 0
      - equal:
          path: spec.strategy.type
          value: RollingUpdate
