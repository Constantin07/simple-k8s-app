name: Helm checks

on:
  pull_request:
    paths:
      - 'pipelines/kubernetes/hello-kubernetes/deploy/**'
      - .github/workflows/helm-checks.yml
    branches:
      - master

  push:
    paths:
      - 'pipelines/kubernetes/hello-kubernetes/deploy/**'
      - .github/workflows/helm-checks.yml
    branches:
      - master

  workflow_dispatch:

permissions: read-all

env:
  HELM_VERSION: 4.0.5
  WORK_DIR: pipelines/kubernetes/hello-kubernetes/deploy
  CHART_REPOSITORY: 'constantin07/hello-kubernetes-helm'

jobs:
  determine-version:
    uses: ./.github/workflows/determine-version.yml

  lint:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ${{ env.WORK_DIR }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Install helm binary
        uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Run helm lint
        run: helm lint ./hello-kubernetes -f values.yaml

  unittest:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ${{ env.WORK_DIR }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Install helm binary
        uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Cache helm plugins
        id: helm-plugin-cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/helm/plugins
          key: ${{ runner.os }}-helm-${{ env.HELM_VERSION }}-plugins-unittest

      - name: Install helm unittest plugin
        if: steps.helm-plugin-cache.outputs.cache-hit != 'true'
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git --verify=false

      - name: Run helm unittest
        run: |
          set -euo pipefail
          helm unittest ./hello-kubernetes | tee test-output.txt

      - name: Publish unittest results to job summary
        if: always()
        run: |
          echo "## Helm Unit Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat test-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  package-push:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write   # important for GHCR
    defaults:
      run:
        working-directory: ${{ env.WORK_DIR }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Install helm binary
        uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Package Helm chart
        run: |
          helm package ./hello-kubernetes
          ls -la

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username ${{ github.actor }} --password-stdin

      - name: Push Helm chart to OCI registry
        run: |
          CHART_FILE="$(ls *.tgz)"
          helm push "$CHART_FILE" oci://ghcr.io/constantin07/hello-kubernetes-helm
