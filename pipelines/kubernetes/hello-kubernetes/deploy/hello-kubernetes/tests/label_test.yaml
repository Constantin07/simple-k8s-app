suite: test common labels

templates:
  - templates/deployment.yaml
  # - templates/service.yaml

#   - "templates/*.yaml"
# excludeTemplates:
#   - crd_*
#   - empty_deployment.yaml
#   - ingress.yaml
#   - rbac.yaml
#   - secret.yaml
#   - servicemonitor.yaml
#   - plugin_version.yaml

tests:
  - it: Deployment has expected labels
    template: templates/deployment.yaml
    asserts:
      - matchRegex:
          path: metadata.labels["app.kubernetes.io/name"]
          pattern: hello-kubernetes
      - matchRegex:
          path: metadata.labels["app.kubernetes.io/instance"]
          pattern: RELEASE-NAME
